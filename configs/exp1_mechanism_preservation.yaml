# Experiment 1: Do existing distillation methods preserve teacher mechanisms?
# Tests baselines only (no RCID). Core evidence for Main Line A.

experiment: exp1_mechanism_preservation

methods:
  - standard_kd
  - fitnets
  - informed_fitnets

tasks:
  - ioi
  - factual
  - winogrande

seeds: [42, 123, 456]

data:
  n_samples: 500

checkpoint_selection:
  top_k: 20
  diversity_ratio: 0.5

training:
  epochs: 20
  batch_size: 16
  lr: 5.0e-5

output_dir: outputs/results/exp1
