# Large-scale distillation configuration
# Adaptive KL methods on Dolly-15K

experiment: large_scale_distillation

# Model
model_family: qwen3
teacher: Qwen/Qwen3-8B
student: Qwen/Qwen3-0.6B

# === Data ===
data:
  source: "databricks/databricks-dolly-15k"
  dataset_seed: 42
  max_seq_len: 512

# === Contrastive Pairs (for potential RCID regulariser) ===
contrastive:
  pairs_dir: data/contrastive_pairs/
  # Per-generator generation settings
  generators:
    entity_swap:
      enabled: true
      max_pairs: 2500
    number_perturb:
      enabled: true
      max_pairs: 2500
    llm:
      enabled: false
      max_pairs: 2500
  data_source: "databricks/databricks-dolly-15k"

# === Training ===
training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4
  lr: 2e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  fp16: true
  save_every_n_epochs: 1

# KL distillation
kl:
  temperature: 2.0
  mode: sequence  # "sequence" or "answer_only"

# === Evaluation ===
evaluation:
  eval_dataset: "databricks/databricks-dolly-15k"
  eval_split: "val"        # training-time validation
  test_split: "test"       # final evaluation
  eval_samples: 500
  eval_metric: "rouge_l"   # primary metric
  max_new_tokens: 256
  eval_batch_size: 8

# === RCID Regulariser ===
rcid:
  lambda_rcid: 0.1            # grid search: [0.01, 0.05, 0.1, 0.5, 1.0]
  rcid_every_n_steps: 5       # compute RCID loss every N main-stream steps
  top_k_checkpoints: 10       # causal checkpoints for RCID/InformedFitNets
  contrastive_data_size: 5000 # target number of auto-generated pairs
  contrastive_pairs_dir: data/contrastive_pairs/

# === SaGD (Saliency-Guided KD) ===
sagd:
  sagd_every_n_steps: 1               # reweight every step (amortised cost)
  sagd_tau_w: 1.0                      # softmax temperature for weight normalisation
  saliency_temperature: 2.0            # saliency → distribution temperature
  teacher_saliency_path: null           # set to data/teacher_saliency_qwen3.pt after precompute

# Methods to compare
methods:
  # KL methods (single data stream)
  - standard_kd
  - reverse_kl
  - standard_kd_akl
  - standard_kd_klr
  # RCID methods (dual data stream: KL + contrastive regulariser)
  - standard_kd_rcid
  - standard_kd_fitnets
  - standard_kd_informed_fitnets
  # SaGD methods (single data stream + precomputed saliency)
  - standard_kd_sagd

seeds: [42, 123, 456]

output_dir: outputs/large_scale
