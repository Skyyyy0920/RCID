# Large-scale distillation configuration
# Standard KD + RCID regularizer on real benchmarks

experiment: large_scale_distillation

# Model
model_family: qwen3
teacher: Qwen/Qwen3-8B
student: Qwen/Qwen3-0.6B

# Main training data
data:
  source: tatsu-lab/alpaca
  max_samples: 52000
  max_seq_len: 512

# Contrastive pairs (for RCID / FitNets / InformedFitNets)
# Per-task generation: each generator has independent quota and output file
contrastive:
  # Directory containing per-task JSONs (e.g. entity_swap.json, number_perturb.json)
  pairs_dir: data/contrastive_pairs/
  # Legacy single-file path (used if pairs_dir does not exist)
  pairs_path_legacy: data/contrastive_pairs.json
  # Which task types to load (null = load all .json files in pairs_dir)
  task_types: null  # e.g. [entity_swap, number_perturb]

  # Per-generator generation settings
  generators:
    entity_swap:
      enabled: true
      max_pairs: 2500
    number_perturb:
      enabled: true
      max_pairs: 2500
    llm:
      enabled: false
      max_pairs: 2500

  # Generation data source
  data_source: tatsu-lab/alpaca
  max_samples: 10000

# Training
training:
  epochs: 3
  batch_size: 8
  gradient_accumulation_steps: 4
  lr: 2e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  fp16: true
  save_every_n_epochs: 1

# KL distillation
kl:
  temperature: 2.0
  mode: sequence  # "sequence" or "answer_only"

# RCID regularizer
rcid:
  enabled: true
  lambda: 0.1
  every_n_steps: 5
  top_k_checkpoints: 20

# Evaluation benchmarks
eval:
  benchmarks:
    - mmlu
    - gsm8k
    - arc_challenge
    - hellaswag
    - winogrande
    - truthfulqa

# Methods to compare
methods:
  - standard_kd
  - standard_kd_rcid

seeds: [42, 123, 456]

output_dir: outputs/large_scale
